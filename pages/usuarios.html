<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css">
    <title>V-ERP - Equipe</title>
</head>
<body>
    <header><h1>👥 Gestão de Usuários</h1></header>
    <nav>
        <ul>
            <li><a href="../index.html">Início</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="produtos.html">Estoque</a></li>
            <li><a href="compras.html">Compras</a></li>
            <li><a href="usuarios.html">Equipe</a></li>
        </ul>
    </nav>

    <main>
        <div class="form-buttons" style="margin-bottom: 20px;">
            <button class="btn btn-hero" onclick="abrirModalUsuario()">+ Criar Novo Usuário</button>
        </div>

        <div class="card">
            <table class="crud-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>E-mail</th>
                        <th>Perfil</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-usuarios"></tbody>
            </table>
        </div>
    </main>

    <!-- Modal de criação de usuário -->
    <div id="modal-usuario" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <h2>Criar Novo Usuário</h2>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="novo-email" placeholder="usuario@empresa.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="nova-senha" placeholder="••••••">
            </div>
            <div class="form-group">
                <label>Confirmar Senha</label>
                <input type="password" id="confirmar-senha" placeholder="••••••">
            </div>
            <div class="form-group">
                <label>Tipo de Perfil</label>
                <select id="novo-perfil">
                    <option value="admin">Admin</option>
                    <option value="usuario">Usuário</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary-modal" onclick="fecharModalUsuario()">Cancelar</button>
                <button class="btn btn-hero" onclick="salvarUsuario()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Toast (notificação) -->
    <div id="toast" class="toast"></div>

    <script src="../js/auth.js"></script>
    <script src="../js/usuarios.js"></script>
    <script>document.addEventListener("DOMContentLoaded", renderUsuarios);</script>
</body>
</html>
