<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css">
    <title>V-ERP - Vendas</title>
</head>
<body>
    <header><h1>💵 Histórico de Vendas</h1></header>
<nav>
    <ul>
        <li><a href="../index.html">Início</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="produtos.html">Estoque</a></li>
        <li><a href="compras.html">Compras</a></li>
        <li><a href="vendas.html">Vendas</a></li>
        <li><a href="usuarios.html">Equipe</a></li>
    </ul>
</nav>

    <main>
        <!-- Estatísticas gerais -->
        <div class="stats">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="stat-total-vendas">-</div>
                    <div class="stat-label">Vendas Realizadas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-itens-vendidos">-</div>
                    <div class="stat-label">Itens Vendidos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-receita">-</div>
                    <div class="stat-label">Receita Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-ticket-medio">-</div>
                    <div class="stat-label">Ticket Médio</div>
                </div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="card" style="margin-top: 30px;">
            <h3>Filtrar Vendas</h3>
            <div class="filtros-vendas">
                <div class="form-group" style="flex: 1;">
                    <label>Buscar por produto ou cliente</label>
                    <input type="text" id="filtro-busca" placeholder="Digite o nome do produto ou e-mail do cliente..." oninput="aplicarFiltros()">
                </div>
                <div class="form-group">
                    <label>Data inicial</label>
                    <input type="date" id="filtro-data-inicio" onchange="aplicarFiltros()">
                </div>
                <div class="form-group">
                    <label>Data final</label>
                    <input type="date" id="filtro-data-fim" onchange="aplicarFiltros()">
                </div>
                <div class="form-group" style="align-self: flex-end;">
                    <button class="btn btn-secondary-modal" onclick="limparFiltros()" style="height: 42px;">Limpar Filtros</button>
                </div>
            </div>
        </div>

        <!-- Lista de vendas -->
        <div class="card" style="margin-top: 20px;">
            <h2>Todas as Vendas</h2>
            <p style="color: #64748b; font-size: 0.9em;">
                Histórico completo de vendas realizadas pelos clientes da loja.
            </p>
            <table class="crud-table" style="margin-top: 20px;">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Cliente</th>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>Valor Total</th>
                    </tr>
                </thead>
                <tbody id="lista-vendas"></tbody>
            </table>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="../js/auth.js"></script>
    <script src="../js/vendas.js"></script>
</body>
</html>
