<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css">
    <title>V-ERP - Loja</title>
</head>
<body>
    <header><h1>🛒 Loja V-ERP</h1></header>
    <nav>
        <ul>
            <li><a href="loja.html">Produtos</a></li>
            <li><a href="minhas-compras.html">Minhas Compras</a></li>
        </ul>
    </nav>

    <main>
        <div class="card">
            <h2>Produtos Disponíveis</h2>
            <p style="color: #64748b;">Escolha um produto e clique em Comprar.</p>
            <table class="crud-table" style="margin-top: 20px;">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Preço</th>
                        <th>Em Estoque</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="lista-loja"></tbody>
            </table>
        </div>
    </main>

    <!-- Modal de COMPRA -->
    <div id="modal-compra" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <h2 id="compra-nome-produto">Comprar Produto</h2>

            <div style="text-align: center; margin: 20px 0;">
                <div style="color: #64748b; font-size: 0.9em;">Valor unitário</div>
                <div id="compra-preco-unit" class="preco-verde-pequeno">R$ 0,00</div>
            </div>

            <div class="form-group">
                <label>Quantidade que deseja comprar</label>
                <input type="number" id="compra-qtd" min="1" value="1" oninput="atualizarTotal()">
                <small id="compra-estoque-info" style="color: #64748b;"></small>
            </div>

            <div style="text-align: center; margin: 25px 0; padding: 20px; background: #f0fdf4; border-radius: 12px;">
                <div style="color: #15803d; font-size: 0.9em; font-weight: 600;">VALOR TOTAL</div>
                <div id="compra-total" class="preco-verde-grande">R$ 0,00</div>
            </div>

            <div class="modal-buttons">
                <button class="btn btn-cancel-compra" onclick="cancelarCompra()">Cancelar Compra</button>
                <button class="btn btn-finalizar-compra" onclick="finalizarCompra()">Finalizar Compra</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="../js/auth.js"></script>
    <script src="../js/loja.js"></script>
</body>
</html>
