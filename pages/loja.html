<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css">
    <title>V-ERP - Loja</title>
</head>
<body>
    <header>
        <h1>🛒 Loja V-ERP</h1>
    </header>
    <nav>
        <ul>
            <li><a href="loja.html">Produtos</a></li>
            <li><a href="carrinho.html">Carrinho <span id="badge-carrinho" class="badge-cart" style="display:none;">0</span></a></li>
            <li><a href="minhas-compras.html">Minhas Compras</a></li>
        </ul>
    </nav>

    <main>
        <div class="card">
            <h2>Produtos Disponíveis</h2>
            <p style="color: #64748b;">Escolha os produtos que deseja e clique em "Adicionar ao Carrinho".</p>
            <table class="crud-table" style="margin-top: 20px;">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Preço</th>
                        <th>Em Estoque</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="lista-loja"></tbody>
            </table>
        </div>
    </main>

    <!-- Modal "Adicionar ao Carrinho" -->
    <div id="modal-adicionar" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <h2 id="add-nome-produto">Adicionar ao Carrinho</h2>

            <div style="text-align: center; margin: 20px 0;">
                <div style="color: #64748b; font-size: 0.9em;">Valor unitário</div>
                <div id="add-preco-unit" class="preco-verde-pequeno">R$ 0,00</div>
            </div>

            <div class="form-group">
                <label>Quantidade</label>
                <input type="number" id="add-qtd" min="1" value="1" oninput="atualizarPreviewAdd()">
                <small id="add-estoque-info" style="color: #64748b;"></small>
            </div>

            <div style="text-align: center; margin: 20px 0; padding: 15px; background: #f0fdf4; border-radius: 10px;">
                <div style="color: #15803d; font-size: 0.85em; font-weight: 600;">SUBTOTAL</div>
                <div id="add-subtotal" class="preco-verde-grande" style="font-size: 2em;">R$ 0,00</div>
            </div>

            <div class="modal-buttons">
                <button class="btn btn-secondary-modal" onclick="fecharModalAdicionar()">Cancelar</button>
                <button class="btn btn-finalizar-compra" onclick="confirmarAdicionar()">Adicionar</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="../js/auth.js"></script>
    <script src="../js/loja.js"></script>
</body>
</html>
