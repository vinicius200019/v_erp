<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>V-ERP - Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--cor-secundaria); }
    </style>
</head>
<body>
    <div class="card" style="width: 100%; max-width: 400px;">
        <h2>Acesso ao Sistema</h2>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="login-email" placeholder="vini@erp.com">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="login-senha" placeholder="••••••">
        </div>
        <button class="btn btn-hero" style="width: 100%;" onclick="handleLogin()">Entrar no Sistema</button>
        <div class="form-link">
            <a href="../index.html">← Voltar para a Home</a>
        </div>
    </div>
    <script src="../js/login.js"></script>
</body>
</html>
