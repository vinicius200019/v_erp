<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css">
    <title>V-ERP - Meu Carrinho</title>
</head>
<body>
    <header>
        <h1>🛒 Meu Carrinho</h1>
    </header>
    <nav>
        <ul>
            <li><a href="loja.html">Produtos</a></li>
            <li><a href="carrinho.html">Carrinho <span id="badge-carrinho" class="badge-cart" style="display:none;">0</span></a></li>
            <li><a href="minhas-compras.html">Minhas Compras</a></li>
        </ul>
    </nav>

    <main>
        <!-- Quando o carrinho está VAZIO -->
        <div id="carrinho-vazio" class="card" style="text-align: center; display: none;">
            <h2>Seu carrinho está vazio 😢</h2>
            <p style="color: #64748b; margin: 20px 0;">
                Volte à loja e adicione produtos para começar a comprar!
            </p>
            <a href="loja.html" class="btn-comprar" style="text-decoration: none; display: inline-block;">
                🛍️ Ir para a Loja
            </a>
        </div>

        <!-- Quando tem itens -->
        <div id="carrinho-conteudo">
            <div class="card">
                <h2>Itens no Carrinho</h2>
                <table class="crud-table" style="margin-top: 20px;">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Preço Unit.</th>
                            <th>Quantidade</th>
                            <th>Subtotal</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="lista-carrinho"></tbody>
                </table>
            </div>

            <!-- Resumo da compra -->
            <div class="resumo-carrinho">
                <div class="resumo-info">
                    <div class="resumo-linha">
                        <span>Total de itens:</span>
                        <strong id="resumo-itens">0</strong>
                    </div>
                    <div class="resumo-linha">
                        <span>Tipos de produtos:</span>
                        <strong id="resumo-tipos">0</strong>
                    </div>
                    <hr style="border: 1px solid #d1fae5; margin: 12px 0;">
                    <div class="resumo-linha resumo-total">
                        <span>VALOR TOTAL:</span>
                        <strong id="resumo-total" class="preco-verde-grande" style="font-size: 1.8em;">R$ 0,00</strong>
                    </div>
                </div>

                <div class="resumo-acoes">
                    <div class="form-group">
                        <label>Forma de Pagamento</label>
                        <select id="carrinho-pagamento">
                            <option value="pix" selected>📱 PIX</option>
                            <option value="dinheiro">💵 Dinheiro</option>
                            <option value="cartao">💳 Cartão de Débito</option>
                            <option value="transferencia">🏦 Transferência</option>
                        </select>
                    </div>

                    <button class="btn-finalizar-compra btn-grande" onclick="finalizarCarrinho()">
                        ✅ Finalizar Compra
                    </button>
                    <button class="btn-secondary-modal btn-grande" onclick="limparCarrinho()" style="margin-top: 10px;">
                        🗑️ Esvaziar Carrinho
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="../js/auth.js"></script>
    <script src="../js/carrinho.js"></script>
</body>
</html>
